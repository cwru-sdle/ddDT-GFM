name: test

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:

    # The package targets Linux + Python 3.9-3.11 (see requires-python in
    # pyproject.toml). Python 3.12 has no torch 2.1/2.2 wheels, and the full
    # PyTorch-Geometric stack (torch_sparse) only ships wheels for Linux.
    strategy:
      fail-fast: false  # don't cancel other matrix jobs when one fails
      matrix:
        python-version: ["3.9", "3.10", "3.11"]
        os: [ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        pip install -e .
        pip install .[test]
    - name: Run tests
      run: |
        pytest
